name: Generate SEO Content

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'AI Model (gemini or deepseek)'
        required: false
        default: 'deepseek'

jobs:
  generate-content:
    runs-on: ubuntu-latest
    env:
      API_KEY_CURRENT: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      MODEL_CHOICE: ${{ github.event.inputs.model || 'deepseek' }}
      THREAD_ID: 1
      TOTAL_THREADS: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Debug API Key
        run: |
          echo "Model choice: $MODEL_CHOICE"
          if [ "$MODEL_CHOICE" = "deepseek" ]; then
            echo "DeepSeek API Key length: ${#DEEPSEEK_API_KEY}"
          else
            echo "Gemini API Key length: ${#API_KEY_CURRENT}"
          fi

      - name: Run Content Factory
        run: |
          echo "Starting content generation with $MODEL_CHOICE..."
          npm run factory

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Generate new content with $MODEL_CHOICE"
            git push
          else
            echo "No changes to commit"
          fi
