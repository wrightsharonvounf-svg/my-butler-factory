name: Generate SEO Content

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'AI Model (gemini or deepseek)'
        required: false
        default: 'deepseek'

jobs:
  generate-content:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      MODEL_CHOICE: deepseek
      THREAD_ID: 1
      TOTAL_THREADS: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Debug API Key
        run: |
          echo "Using direct DeepSeek connection"
          echo "API Key length: ${#DEEPSEEK_API_KEY}"

      - name: Run Content Factory
        run: |
          echo "Starting content generation with direct DeepSeek API..."
          npm run factory

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Generate new content with direct DeepSeek API"
            git push
          else
            echo "No changes to commit"
          fi
