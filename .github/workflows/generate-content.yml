name: Generate SEO Content (Light)

on:
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      API_KEY_CURRENT: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Debug API Key
        run: |
          echo "Using lightweight generation"
          echo "API Key set: ${{ secrets.DEEPSEEK_API_KEY != '' }}"

      - name: Run Light Content Factory
        run: |
          echo "🚀 Starting lightweight content generation..."
          npm run factory

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Generate lightweight content"
            git push
          else
            echo "No changes to commit"
          fi
